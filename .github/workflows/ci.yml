# אימות קוד + ביקורת תלויות + E2E בסיסי (Playwright) בכל push/PR ל-main
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run prebuild
      - run: npm run verify
      - name: npm audit (אזהרות — לא חוסם)
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
